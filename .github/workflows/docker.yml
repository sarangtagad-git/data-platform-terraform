name: Docker Build & Push

on:
  push:
    branches: [main]
    paths:
      - "docker/etl-job/**"   # only triggers when ETL job code changes
  workflow_dispatch:           # allows manual trigger from GitHub Actions UI

permissions:
  id-token: write  # allows GitHub to get OIDC token
  contents: read   # allows GitHub to read repo code

env:
  AWS_REGION:   "ap-south-1"
  ECR_REPO:     "data-platform-dev-etl-job"
  IMAGE_TAG:    "latest"

concurrency:
  group: docker-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-push:
    name: Build & Push ETL image to ECR
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/data-platform-dev-github-actions
          aws-region: ${{ env.AWS_REGION }}
          role-duration-seconds: 900  # 15 min — enough for a Docker build and push

      - name: Login to ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build Docker image
        run: |
          docker build \
            -t ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPO }}:${{ env.IMAGE_TAG }} \
            docker/etl-job/

      - name: Push Docker image to ECR
        run: |
          docker push \
            ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPO }}:${{ env.IMAGE_TAG }}

      - name: Print image URI
        run: |
          echo "Image pushed: ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPO }}:${{ env.IMAGE_TAG }}"
